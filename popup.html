<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JSON → CSV Pro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">
  <h1>JSON → CSV Pro</h1>

  <textarea id="jsonInput" placeholder="Paste JSON or drop file..."></textarea>

  <div class="controls">
    <button id="convertBtn">Convert</button>
    <button id="copyBtn" disabled>Copy CSV</button>
    <button id="downloadBtn" disabled>Download</button>
  </div>

  <div id="columns"></div>

  <div id="tableContainer"></div>

  <p id="error"></p>
</div>

<script src="utils.js"></script>
<script src="popup.js"></script>
</body>
</html>
